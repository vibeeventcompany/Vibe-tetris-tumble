<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vibe Event Company - Giant Tetris Tumble</title>

<style>

body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #f8f8f8;
    margin: 0;
    padding: 20px;
}

.logo {
    font-size: 30px;
    font-weight: bold;
    color: #ff7a00;
    margin-top: 20px;
}

h1 {
    color: #333;
    margin-bottom: 5px;
}

.subtitle {
    color: #666;
    font-size: 18px;
}

.game-box {
    background: white;
    border-radius: 25px;
    padding: 30px;
    margin: 30px auto;
    max-width: 420px;
    box-shadow: 0 5px 20px rgba(0,0,0,.1);
}

#piece {
    height: 320px;
    display: flex;
    justify-content: center;
    align-items: center;
}

#piece img {
    width: 300px;
    height: 300px;
    object-fit: contain;
}

button {
    background: #ff7a00;
    color: white;
    border: none;
    border-radius: 50px;
    padding: 18px 45px;
    font-size: 22px;
    font-weight: bold;
    margin: 10px;
    cursor: pointer;
}

button:hover {
    transform: scale(1.05);
}

.stop {
    background: #333;
}

.footer {
    margin-top: 30px;
    color: #777;
    font-size: 16px;
}

</style>

</head>


<body>

<div class="logo">
VIBE EVENT COMPANY
</div>

<h1>
Giant Tetris Tumble
</h1>

<p class="subtitle">
Your Tetris Challenge Starts Here!
</p>


<div class="game-box">

<h2>Your Piece Is:</h2>

<div id="piece">
🧩
</div>


<button onclick="spin()">
SPIN
</button>

<button class="stop" onclick="stopSpin()">
STOP
</button>


</div>


<div class="footer">
Scan • Spin • Play
</div>



<script>

let spinning = false;
let interval;


// Tetris images

const pieces = [
    "Images/i.png",
    "Images/o.png",
    "Images/t.png",
    "Images/l.png",
    "Images/j.png",
    "Images/s.png",
    "Images/z.png"
];


// Preload images

pieces.forEach(function(piece) {

    let img = new Image();
    img.src = piece;

});



const pieceDisplay = document.getElementById("piece");



// Show random piece

function showPiece() {

    let randomPiece =
    pieces[Math.floor(Math.random() * pieces.length)];


    pieceDisplay.innerHTML =
    `<img src="${randomPiece}">`;

}



// Start spinning

function spin() {

    if (spinning) return;

    spinning = true;

    interval =
    setInterval(showPiece, 100);

}



// Stop spinning

function stopSpin() {

    if (!spinning) return;

    clearInterval(interval);

    showPiece();

    spinning = false;

}


</script>


</body>
</html>
